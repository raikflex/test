<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cocina · Crepes & Waffles</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,400&family=Jost:wght@400;500;600;700&display=swap');

    :root {
      --bg:      #090807;
      --s1:      #111009;
      --s2:      #1a1815;
      --border:  #252220;
      --verde:   #4a7c59;
      --vl:      #6aad7e;
      --crema:   #f0e6d2;
      --crema2:  #c8b99a;
      --muted:   #6b6057;
      --nuevo:   #d4a017;
      --prep:    #3b82f6;
      --listo:   #4a7c59;
      --danger:  #c0392b;
    }

    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--bg);
      color: var(--crema);
      min-height: 100vh;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top:0; z-index:50;
    }
    .topbar-marca {
      display: flex; flex-direction: column;
    }
    .topbar-marca h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px; font-weight: 600;
      color: var(--crema); letter-spacing: 0.01em;
    }
    .topbar-marca h1 em { font-style: italic; font-weight: 400; color: var(--crema2); }
    .topbar-sub { font-size: 11px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 1px; }

    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--vl); animation: pulso 2s ease-in-out infinite; }
    .status-dot.off { background: var(--danger); animation: none; }
    @keyframes pulso { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

    .btn-sonido {
      background: var(--s2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted); font-size: 16px;
      width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }

    /* ── STATS ── */
    .stats {
      display: flex; gap: 10px;
      padding: 14px 20px;
      background: var(--s1); border-bottom: 1px solid var(--border);
    }
    .stat {
      flex: 1; background: var(--s2); border-radius: 10px;
      padding: 12px 14px; text-align: center;
    }
    .stat-n { font-size: 26px; font-weight: 700; line-height: 1; }
    .stat-l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 3px; }
    .c-nuevo  { color: var(--nuevo); }
    .c-prep   { color: var(--prep);  }
    .c-listo  { color: var(--vl);    }

    /* ── FILTROS ── */
    .filtros { display: flex; gap: 8px; padding: 14px 20px 0; flex-wrap: wrap; }
    .f-btn {
      padding: 6px 14px; border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-size: 12px; font-family: 'Jost', sans-serif; font-weight: 500;
      cursor: pointer; transition: all .15s; letter-spacing: 0.04em;
    }
    .f-btn.activo { background: var(--crema); color: var(--bg); border-color: var(--crema); }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px; padding: 14px 20px 40px;
    }

    /* ── CARD PEDIDO ── */
    .card {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
      display: flex; flex-direction: column;
      animation: slideIn .3s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }

    .card.nuevo    { border-left: 3px solid var(--nuevo); }
    .card.preparando { border-left: 3px solid var(--prep); }
    .card.listo    { border-left: 3px solid var(--vl); opacity: .55; }

    .card-head {
      padding: 13px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .card-mesa {
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 600;
    }
    .card-num { font-size: 11px; color: var(--muted); }
    .card-hora { font-size: 11px; color: var(--muted); }

    .badge {
      display: inline-block; padding: 3px 9px; border-radius: 100px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
    }
    .b-nuevo    { background: rgba(212,160,23,.15); color: var(--nuevo); }
    .b-prep     { background: rgba(59,130,246,.15);  color: var(--prep);  }
    .b-listo    { background: rgba(74,124,89,.15);   color: var(--vl);   }

    .card-items { padding: 13px 16px; flex: 1; }
    .card-item {
      font-size: 13px; color: var(--crema);
      padding: 4px 0; border-bottom: 1px solid #1a1815;
      display: flex; gap: 8px; align-items: baseline;
    }
    .card-item:last-child { border-bottom: none; }
    .ci-cant { font-weight: 700; color: var(--nuevo); min-width: 20px; }

    .card-notas {
      margin: 0 14px 10px;
      background: rgba(212,160,23,.08);
      border: 1px solid rgba(212,160,23,.2);
      border-radius: 8px; padding: 7px 10px;
      font-size: 12px; color: var(--nuevo);
      line-height: 1.4;
    }

    .card-adicion {
      margin: 0 14px 10px;
      background: rgba(74,124,89,.1);
      border: 1px solid rgba(74,124,89,.25);
      border-radius: 8px; padding: 7px 10px;
      font-size: 12px; color: var(--vl);
    }

    .card-tiempo {
      padding: 0 16px 10px;
      font-size: 11px; color: var(--muted);
    }
    .card-tiempo.urgente { color: var(--danger); font-weight: 600; }

    .card-footer {
      padding: 10px 14px; display: flex; gap: 7px;
      border-top: 1px solid var(--border);
    }
    .btn-acc {
      flex: 1; padding: 9px; border-radius: 8px; border: none;
      font-size: 12px; font-weight: 600; letter-spacing: .04em;
      font-family: 'Jost', sans-serif; cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn-acc:active { transform: scale(.97); }
    .btn-prep      { background: var(--prep);  color: white; }
    .btn-listo     { background: var(--vl);    color: white; }
    .btn-entregado { background: var(--crema); color: var(--bg); font-weight: 700; }
    .btn-arc       { background: var(--s2);    color: var(--muted); flex: 0; padding: 9px 13px; }

    /* ── TEMPORIZADOR ── */
    .card-timer {
      padding: 8px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border);
      font-size: 12px;
    }
    .timer-barra-bg {
      flex: 1; height: 4px; background: var(--border);
      border-radius: 2px; margin: 0 10px; overflow: hidden;
    }
    .timer-barra {
      height: 100%; border-radius: 2px;
      background: var(--vl);
      transition: width .5s linear, background .5s;
    }
    .timer-barra.medio   { background: var(--nuevo); }
    .timer-barra.urgente { background: var(--danger); }
    .timer-label { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .timer-label.urgente { color: var(--danger); font-weight: 700; }

    /* card retrasada pulsa */
    .card.retrasada { border-left: 3px solid var(--danger); animation: pulsoCard 1.2s ease-in-out infinite; }
    @keyframes pulsoCard { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 0 3px rgba(192,57,43,.25)} }

    /* ── POPUP ALERTA RETRASOS ── */
    .popup-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.75); z-index: 300;
      align-items: center; justify-content: center; padding: 20px;
    }
    .popup-overlay.visible { display: flex; }
    .popup {
      background: var(--s1); border: 1px solid var(--danger);
      border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 420px;
    }
    .popup-icon { font-size: 36px; margin-bottom: 12px; }
    .popup-titulo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; color: var(--danger); margin-bottom: 6px;
    }
    .popup-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; line-height: 1.5; }
    .popup-lista { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .popup-item {
      background: rgba(192,57,43,.1); border: 1px solid rgba(192,57,43,.25);
      border-radius: 10px; padding: 10px 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .popup-item-info { font-size: 13px; color: var(--crema); }
    .popup-item-info span { font-size: 11px; color: var(--muted); display: block; margin-top: 2px; }
    .popup-item-mins { font-size: 18px; font-weight: 700; color: var(--danger); }
    .btn-popup-cerrar {
      width: 100%; background: var(--danger); color: white;
      border: none; border-radius: 10px; padding: 13px;
      font-size: 14px; font-weight: 600; font-family: 'Jost', sans-serif; cursor: pointer;
    }
    .btn-popup-cerrar:active { opacity: .85; }

    /* ── VACÍO ── */
    .vacio {
      grid-column: 1/-1; text-align: center;
      padding: 80px 20px; color: var(--muted);
    }
    .vacio-t {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-style: italic;
      color: var(--crema2); margin-bottom: 8px; opacity: .5;
    }
    .vacio-s { font-size: 13px; }

    /* ── NOTIF ── */
    .notif {
      position: fixed; top: 74px; right: 20px;
      background: var(--nuevo); color: #1a1410;
      padding: 10px 18px; border-radius: 10px;
      font-size: 13px; font-weight: 700;
      transform: translateX(120%);
      transition: transform .3s cubic-bezier(.175,.885,.32,1.275);
      z-index: 200;
    }
    .notif.show { transform: translateX(0); }
  </style>
</head>
<body>

<div class="notif" id="notif">Pedido nuevo</div>

<div class="topbar">
  <div class="topbar-marca">
    <h1>Crepes <em>&</em> Waffles</h1>
    <span class="topbar-sub">Terminal de cocina</span>
  </div>
  <div class="topbar-right">
    <button class="btn-sonido" id="btn-sonido" onclick="toggleSonido()" title="Sonido">🔕</button>
    <div class="status">
      <div class="status-dot" id="dot"></div>
      <span id="txt-status">Conectado</span>
    </div>
  </div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-n c-nuevo" id="s-nuevo">0</div><div class="stat-l">Nuevos</div></div>
  <div class="stat"><div class="stat-n c-prep"  id="s-prep">0</div><div class="stat-l">En prep.</div></div>
  <div class="stat"><div class="stat-n c-listo" id="s-listo">0</div><div class="stat-l">Listos hoy</div></div>
  <div class="stat" style="cursor:pointer" onclick="abrirPopupRetrasos()">
    <div class="stat-n" id="s-retrasados" style="color:var(--danger)">0</div>
    <div class="stat-l">Retrasados</div>
  </div>
</div>

<div class="filtros">
  <button class="f-btn activo" onclick="filtrar('todos',this)">Todos</button>
  <button class="f-btn" onclick="filtrar('nuevo',this)">Nuevos</button>
  <button class="f-btn" onclick="filtrar('preparando',this)">Preparando</button>
  <button class="f-btn" onclick="filtrar('listo',this)">Listos</button>
  <button class="f-btn" id="f-retrasados" onclick="filtrar('retrasado',this)" style="border-color:rgba(192,57,43,.4);color:var(--danger)">⚠ Retrasados</button>
</div>

<!-- POPUP RETRASOS -->
<div class="popup-overlay" id="popup-retrasos">
  <div class="popup">
    <div class="popup-icon">⏰</div>
    <div class="popup-titulo">Pedidos retrasados</div>
    <div class="popup-sub">Los siguientes pedidos llevan más de 15 minutos sin ser entregados.</div>
    <div class="popup-lista" id="popup-lista"></div>
    <button class="btn-popup-cerrar" onclick="cerrarPopup()">Entendido, voy a atenderlos</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwSSG6saF5SMOeDCTHk4KF9yJL8MSmYPTjBfkafEYak1kqyEZ408QIJU1B-5NIigFqGxQ/exec';
const LIMITE_MIN = 15; // minutos antes de marcar como retrasado

let pedidos = [];
let filtroActivo = 'todos';
let sonidoOn = false;
let audioCtx = null;
let idsVistos = null;
let listosHoy = 0;
let popupYaMostrado = {};

/* ── SONIDO ── */
function toggleSonido() {
  sonidoOn = !sonidoOn;
  document.getElementById('btn-sonido').textContent = sonidoOn ? '🔔' : '🔕';
  if (sonidoOn && !audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}
function beep(freq=880, dur=0.4) {
  if (!sonidoOn||!audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value = freq;
  g.gain.setValueAtTime(.3, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime+dur);
  o.start(); o.stop(audioCtx.currentTime+dur);
}
function beepAlerta() {
  // triple beep para retraso
  beep(660, .2);
  setTimeout(() => beep(660, .2), 300);
  setTimeout(() => beep(880, .4), 600);
}

/* ── FETCH ── */
async function fetchPedidos() {
  try {
    const r = await fetch(SCRIPT_URL + '?accion=get_pedidos&t=' + Date.now());
    if (!r.ok) throw new Error();
    const data = await r.json();
    const ids = data.map(p => p.numero+'');
    if (idsVistos && ids.some(id => !idsVistos.includes(id))) { mostrarNotif(); beep(); }
    idsVistos = ids;
    pedidos = data;
    verificarRetrasos();
    renderStats();
    renderGrid();
    setOnline(true);
  } catch(e) { setOnline(false); }
}

function setOnline(ok) {
  document.getElementById('dot').className = 'status-dot' + (ok?'':' off');
  document.getElementById('txt-status').textContent = ok ? 'Conectado' : 'Sin conexión';
}

function mostrarNotif() {
  const n = document.getElementById('notif');
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 3500);
}

/* ── VERIFICAR RETRASOS ── */
function verificarRetrasos() {
  const retrasados = pedidos.filter(p =>
    p.estado !== 'listo' && p.estado !== 'entregado' && minutos(p.hora) >= LIMITE_MIN
  );
  // Mostrar popup automático solo 1 vez por pedido retrasado
  retrasados.forEach(p => {
    if (!popupYaMostrado[p.numero]) {
      popupYaMostrado[p.numero] = true;
      beepAlerta();
      abrirPopupRetrasos();
    }
  });
}

/* ── POPUP RETRASOS ── */
function abrirPopupRetrasos() {
  const retrasados = pedidos.filter(p =>
    p.estado !== 'listo' && p.estado !== 'entregado' && minutos(p.hora) >= LIMITE_MIN
  );
  if (!retrasados.length) return;
  const lista = document.getElementById('popup-lista');
  lista.innerHTML = retrasados.map(p => `
    <div class="popup-item">
      <div class="popup-item-info">
        Mesa ${p.mesa} — #${p.numero}
        <span>${(p.items||'').split(',')[0].trim()}${p.items.split(',').length > 1 ? ' +' + (p.items.split(',').length-1) + ' más' : ''}</span>
      </div>
      <div class="popup-item-mins">${minutos(p.hora)} min</div>
    </div>`).join('');
  document.getElementById('popup-retrasos').classList.add('visible');
}
function cerrarPopup() {
  document.getElementById('popup-retrasos').classList.remove('visible');
}

/* ── ACCIONES ── */
async function cambiarEstado(num, estado) {
  const p = pedidos.find(x => x.numero == num);
  if (p) {
    p.estado = estado;
    if (estado === 'listo') listosHoy++;
  }
  renderStats(); renderGrid();
  try {
    await fetch(SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({accion:'actualizar_estado', numero:num, estado}),
    });
  } catch(e){}
}

async function marcarEntregado(num) {
  const p = pedidos.find(x => x.numero == num);
  if (p) p.estado = 'entregado';
  renderStats(); renderGrid();
  try {
    await fetch(SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({accion:'actualizar_estado', numero:num, estado:'entregado'}),
    });
  } catch(e){}
}

async function archivar(num) {
  pedidos = pedidos.filter(p => p.numero != num);
  renderStats(); renderGrid();
  try {
    await fetch(SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({accion:'eliminar', numero:num}),
    });
  } catch(e){}
}

/* ── RENDER ── */
function filtrar(f, btn) {
  filtroActivo = f;
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('activo'));
  btn.classList.add('activo');
  renderGrid();
}

function minutos(hora) {
  if (!hora || !hora.includes(':')) return 0;
  // Soporta "14:30", "7:46 p. m.", "7:46 PM", "7:46 p.m."
  const limpio = hora.replace(/\./g, '').trim();
  const esAM = /a\s*m/i.test(limpio);
  const esPM = /p\s*m/i.test(limpio);
  const nums = limpio.match(/(\d+):(\d+)/);
  if (!nums) return 0;
  let h = parseInt(nums[1]);
  const m = parseInt(nums[2]);
  if (esPM && h !== 12) h += 12;
  if (esAM && h === 12) h = 0;
  const ahora = new Date();
  return (ahora.getHours() * 60 + ahora.getMinutes()) - (h * 60 + m);
}

function timerHtml(p) {
  if (p.estado === 'listo' || p.estado === 'entregado') return '';
  const mins = minutos(p.hora);
  const pct = Math.min(100, (mins / LIMITE_MIN) * 100);
  const clase = pct >= 100 ? 'urgente' : pct >= 60 ? 'medio' : '';
  const restante = LIMITE_MIN - mins;
  const labelTxt = pct >= 100
    ? `⚠ ${mins} min — retrasado`
    : restante <= 0 ? 'Límite alcanzado'
    : `${restante} min restantes`;
  return `<div class="card-timer">
    <div class="timer-barra-bg">
      <div class="timer-barra ${clase}" style="width:${pct}%"></div>
    </div>
    <span class="timer-label ${clase}">${labelTxt}</span>
  </div>`;
}

function renderStats() {
  const retrasados = pedidos.filter(p =>
    p.estado !== 'listo' && p.estado !== 'entregado' && minutos(p.hora) >= LIMITE_MIN
  ).length;
  document.getElementById('s-nuevo').textContent = pedidos.filter(p => p.estado==='nuevo').length;
  document.getElementById('s-prep').textContent  = pedidos.filter(p => p.estado==='preparando').length;
  document.getElementById('s-listo').textContent = listosHoy;
  document.getElementById('s-retrasados').textContent = retrasados;
  // resaltar stat si hay retrasos
  document.getElementById('s-retrasados').closest('.stat').style.background =
    retrasados > 0 ? 'rgba(192,57,43,.15)' : '';
}

function renderGrid() {
  let mostrar;
  if (filtroActivo === 'retrasado') {
    mostrar = pedidos.filter(p =>
      p.estado !== 'listo' && p.estado !== 'entregado' && minutos(p.hora) >= LIMITE_MIN
    );
  } else if (filtroActivo === 'todos') {
    mostrar = pedidos;
  } else {
    mostrar = pedidos.filter(p => p.estado === filtroActivo);
  }

  const orden = {nuevo:0, preparando:1, listo:2, entregado:3};
  mostrar.sort((a,b) => (orden[a.estado]||0) - (orden[b.estado]||0));

  const grid = document.getElementById('grid');
  if (!mostrar.length) {
    grid.innerHTML = `<div class="vacio">
      <div class="vacio-t">Sin pedidos</div>
      <div class="vacio-s">Los pedidos aparecen aquí en tiempo real</div>
    </div>`;
    return;
  }

  grid.innerHTML = mostrar.map(p => {
    const retrasado = p.estado !== 'listo' && p.estado !== 'entregado' && minutos(p.hora) >= LIMITE_MIN;
    const estadoClass = retrasado ? 'retrasada' : p.estado;

    const bc = {nuevo:'b-nuevo', preparando:'b-prep', listo:'b-listo', entregado:'b-listo'}[p.estado] || 'b-nuevo';
    const bt = {nuevo:'Nuevo', preparando:'Preparando', listo:'Listo ✓', entregado:'Entregado ✓'}[p.estado] || p.estado;

    const notaLimpia = p.notas ? p.notas.replace(/\[Adición al #\d+\]\s*·?\s*/,'').trim() : '';
    const adicionMatch = p.notas && p.notas.match(/\[Adición al (#\d+)\]/);

    const itemsHtml = (p.items||'').split(',').map(it => {
      const m = it.trim().match(/^(\d+)x?\s+(.+)$/i);
      return m
        ? `<div class="card-item"><span class="ci-cant">${m[1]}×</span>${m[2]}</div>`
        : `<div class="card-item">${it.trim()}</div>`;
    }).join('');

    const adicionHtml = adicionMatch
      ? `<div class="card-adicion">↳ Adición al pedido ${adicionMatch[1]}</div>` : '';
    const notaHtml = notaLimpia
      ? `<div class="card-notas">⚠ ${notaLimpia}</div>` : '';

    // Botones según estado
    let botones = '';
    if (p.estado === 'nuevo') {
      botones = `
        <button class="btn-acc btn-prep"  onclick="cambiarEstado(${p.numero},'preparando')">Preparando</button>
        <button class="btn-acc btn-listo" onclick="cambiarEstado(${p.numero},'listo')">Listo ✓</button>`;
    } else if (p.estado === 'preparando') {
      botones = `
        <button class="btn-acc btn-listo" onclick="cambiarEstado(${p.numero},'listo')">Marcar listo ✓</button>`;
    } else if (p.estado === 'listo') {
      botones = `
        <button class="btn-acc btn-entregado" onclick="marcarEntregado(${p.numero})">Entregado a la mesa</button>
        <button class="btn-acc btn-arc" onclick="archivar(${p.numero})">Archivar</button>`;
    } else if (p.estado === 'entregado') {
      botones = `
        <button class="btn-acc btn-arc" onclick="archivar(${p.numero})">Archivar</button>`;
    }

    return `<div class="card ${estadoClass}">
      <div class="card-head">
        <div>
          <div class="card-mesa">Mesa ${p.mesa}</div>
          <div class="card-num">#${p.numero}</div>
        </div>
        <div style="text-align:right">
          <div class="badge ${bc}">${bt}</div>
          <div class="card-hora">${p.hora}</div>
        </div>
      </div>
      <div class="card-items">${itemsHtml}</div>
      ${adicionHtml}
      ${notaHtml}
      ${timerHtml(p)}
      <div class="card-footer">${botones}</div>
    </div>`;
  }).join('');
}
