<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>El Sabor Colombiano — Mesa 05</title>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap');

    :root {
      --bg: #0f0e0d;
      --surface: #1a1917;
      --surface2: #242220;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --cream: #f5efe0;
      --muted: #7a7062;
      --danger: #e05252;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--cream);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* HEADER */
    .hero {
      background: var(--surface);
      padding: 32px 20px 24px;
      border-bottom: 1px solid #2a2722;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .mesa-chip {
      display: inline-block;
      background: var(--gold);
      color: #1a1410;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 100px;
      margin-bottom: 8px;
    }
    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.1;
    }
    .hero p { font-size: 13px; color: var(--muted); margin-top: 3px; }

    /* CATEGORÍAS */
    .categorias {
      display: flex;
      gap: 8px;
      padding: 16px 20px;
      overflow-x: auto;
      scrollbar-width: none;
      background: var(--surface);
      border-bottom: 1px solid #2a2722;
    }
    .categorias::-webkit-scrollbar { display: none; }
    .cat-btn {
      flex-shrink: 0;
      padding: 7px 14px;
      border-radius: 100px;
      border: 1px solid #2a2722;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .cat-btn.activa {
      background: var(--gold);
      border-color: var(--gold);
      color: #1a1410;
      font-weight: 600;
    }

    /* SECCIÓN DE PRODUCTOS */
    .seccion-titulo {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      color: var(--gold);
      padding: 20px 20px 12px;
    }

    .productos {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .producto-card {
      background: var(--surface);
      border: 1px solid #2a2722;
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s;
    }
    .producto-card:hover { border-color: #3a3530; }

    .prod-emoji {
      font-size: 36px;
      flex-shrink: 0;
      width: 52px;
      text-align: center;
    }
    .prod-info { flex: 1; min-width: 0; }
    .prod-nombre {
      font-size: 15px;
      font-weight: 500;
      color: var(--cream);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .prod-desc {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .prod-precio {
      font-size: 14px;
      font-weight: 600;
      color: var(--gold-light);
      margin-top: 4px;
    }
    .prod-acciones {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn-cantidad {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid #3a3530;
      background: var(--surface2);
      color: var(--cream);
      font-size: 18px;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.15s;
    }
    .btn-cantidad:active { background: #2e2b27; }
    .cantidad-num {
      font-size: 15px;
      font-weight: 600;
      min-width: 18px;
      text-align: center;
      color: var(--cream);
    }

    /* CARRITO FLOTANTE */
    .carrito-bar {
      position: sticky;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px 20px;
      background: linear-gradient(to top, var(--bg) 80%, transparent);
      z-index: 60;
    }
    .carrito-btn {
      width: 100%;
      background: var(--gold);
      color: #1a1410;
      border: none;
      border-radius: var(--radius);
      padding: 16px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.15s, transform 0.1s;
    }
    .carrito-btn:active { transform: scale(0.98); }
    .carrito-btn.oculto { display: none; }
    .carrito-btn-count {
      background: #1a1410;
      color: var(--gold);
      border-radius: 100px;
      padding: 2px 10px;
      font-size: 13px;
    }

    /* MODAL CARRITO */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: var(--surface);
      width: 100%;
      max-width: 480px;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 32px;
      max-height: 85vh;
      overflow-y: auto;
    }
    .modal-handle {
      width: 40px;
      height: 4px;
      background: #3a3530;
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      margin-bottom: 16px;
      color: var(--cream);
    }

    .item-carrito {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #2a2722;
      font-size: 14px;
    }
    .item-carrito:last-of-type { border-bottom: none; }
    .item-carrito-nombre { color: var(--cream); flex: 1; }
    .item-carrito-precio { color: var(--gold-light); font-weight: 600; margin-left: 16px; }
    .item-carrito-quitar {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 18px;
      cursor: pointer;
      padding: 0 0 0 12px;
      line-height: 1;
    }

    /* CAMPO MESA */
    .campo-mesa {
      margin: 16px 0;
    }
    .campo-mesa label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .campo-mesa input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid #3a3530;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      font-family: 'Outfit', sans-serif;
      color: var(--cream);
      outline: none;
    }
    .campo-mesa input:focus { border-color: var(--gold); }

    /* NOTAS */
    .campo-notas textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid #3a3530;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      color: var(--cream);
      resize: none;
      outline: none;
      margin-top: 6px;
    }
    .campo-notas label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .total-linea {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0 16px;
      border-top: 1px solid #2a2722;
      margin-top: 8px;
    }
    .total-linea span { font-size: 14px; color: var(--muted); }
    .total-linea strong {
      font-size: 20px;
      font-weight: 700;
      color: var(--gold-light);
    }

    .btn-confirmar {
      width: 100%;
      background: var(--gold);
      color: #1a1410;
      border: none;
      border-radius: var(--radius);
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .btn-confirmar:active { transform: scale(0.98); }
    .btn-cancelar {
      width: 100%;
      background: transparent;
      color: var(--muted);
      border: 1px solid #2a2722;
      border-radius: var(--radius);
      padding: 14px;
      font-size: 14px;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      margin-top: 8px;
    }

    /* PANTALLA ÉXITO */
    #pantalla-exito {
      display: none;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 40px 24px;
      text-align: center;
    }
    #pantalla-exito.visible { display: flex; }
    .exito-icon {
      font-size: 64px;
      margin-bottom: 20px;
      animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    #pantalla-exito h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--cream);
      margin-bottom: 10px;
    }
    #pantalla-exito p { font-size: 15px; color: var(--muted); line-height: 1.6; }
    .pedido-num {
      background: var(--surface);
      border: 1px solid #2a2722;
      border-radius: 12px;
      padding: 16px 24px;
      margin: 20px 0;
      font-size: 28px;
      font-weight: 700;
      color: var(--gold-light);
      font-family: 'Playfair Display', serif;
    }

    .spacer { height: 100px; }
  </style>
</head>
<body>

<!-- ══ PANTALLA MENÚ ══ -->
<div id="pantalla-menu">
  <div class="hero">
    <div class="mesa-chip" id="chip-mesa">Mesa 05</div>
    <h1>El Sabor<br>Colombiano</h1>
    <p>Elige tus platos y pide directo desde aquí</p>
  </div>

  <div class="categorias">
    <button class="cat-btn activa" onclick="filtrar('todos', this)">Todo</button>
    <button class="cat-btn" onclick="filtrar('principal', this)">Platos fuertes</button>
    <button class="cat-btn" onclick="filtrar('entrada', this)">Entradas</button>
    <button class="cat-btn" onclick="filtrar('bebida', this)">Bebidas</button>
    <button class="cat-btn" onclick="filtrar('postre', this)">Postres</button>
  </div>

  <div id="lista-productos"></div>
  <div class="spacer"></div>
</div>

<!-- Barra carrito flotante -->
<div class="carrito-bar" id="pantalla-menu-extra">
  <button class="carrito-btn oculto" id="btn-carrito" onclick="abrirCarrito()">
    <span>Ver pedido</span>
    <span class="carrito-btn-count" id="carrito-count">0 items</span>
  </button>
</div>

<!-- ══ MODAL CARRITO ══ -->
<div class="modal-overlay" id="modal-carrito">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Tu pedido</h2>
    <div id="lista-carrito"></div>

    <div class="campo-mesa">
      <label>Número de mesa</label>
      <input type="text" id="input-mesa" placeholder="Ej: 05" value="05">
    </div>
    <div class="campo-notas">
      <label>Notas para cocina (opcional)</label>
      <textarea id="input-notas" rows="2" placeholder="Ej: sin picante, sin cebolla..."></textarea>
    </div>

    <div class="total-linea">
      <span>Total</span>
      <strong id="total-modal">$0</strong>
    </div>
    <button class="btn-confirmar" onclick="enviarPedido()">Enviar pedido a cocina</button>
    <button class="btn-cancelar" onclick="cerrarCarrito()">Seguir mirando</button>
  </div>
</div>

<!-- ══ PANTALLA ÉXITO ══ -->
<div id="pantalla-exito">
  <div class="exito-icon">🍽️</div>
  <h2>¡Pedido enviado!</h2>
  <p>Tu número de pedido es</p>
  <div class="pedido-num" id="num-pedido">#0000</div>
  <p>El equipo de cocina ya lo vio.<br>Pronto estará en tu mesa.</p>
</div>

<script>
/* ══════════════════════════════════════════
   CONFIGURACIÓN — CAMBIA ESTOS VALORES
   ══════════════════════════════════════════
   Sigue las instrucciones del archivo LEEME.html
   para obtener tu URL de Google Apps Script
*/
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwblNVFnvonU2ogCloEKy0tR_wIqD--kRbpgX61ATGHr7KIqEWUlllrX5irOaZACgvgUg/exec';

/* ══ MENÚ ══ */
const MENU = [
  { id: 1, nombre: 'Bandeja Paisa Especial', desc: 'Frijoles, chicharrón, huevo, chorizo, arroz', precio: 35000, cat: 'principal', emoji: '🫘' },
  { id: 2, nombre: 'Ajiaco Bogotano', desc: 'Papa criolla, pollo, guascas, crema', precio: 28000, cat: 'principal', emoji: '🍲' },
  { id: 3, nombre: 'Chuleta de Cerdo', desc: 'Con papas criollas y ensalada', precio: 32000, cat: 'principal', emoji: '🥩' },
  { id: 4, nombre: 'Porción de Patacones', desc: 'Con hogao y ají', precio: 8000, cat: 'entrada', emoji: '🫓' },
  { id: 5, nombre: 'Empanadas (3 uds)', desc: 'Rellenas de carne y papa', precio: 9000, cat: 'entrada', emoji: '🥟' },
  { id: 6, nombre: 'Arepa de Chócolo', desc: 'Con cuajada fresca', precio: 7000, cat: 'entrada', emoji: '🌽' },
  { id: 7, nombre: 'Jugo de Lulo', desc: 'Natural, con o sin leche', precio: 7000, cat: 'bebida', emoji: '🥤' },
  { id: 8, nombre: 'Jugo de Mandarina', desc: 'Recién exprimido', precio: 7000, cat: 'bebida', emoji: '🍊' },
  { id: 9, nombre: 'Agua Panela', desc: 'Con limón', precio: 5000, cat: 'bebida', emoji: '🫖' },
  { id: 10, nombre: 'Postre del Día', desc: 'Pregunta al mesero', precio: 8000, cat: 'postre', emoji: '🍮' },
  { id: 11, nombre: 'Tres Leches', desc: 'Porción individual', precio: 10000, cat: 'postre', emoji: '🎂' },
];

let carrito = {};
let categoriaActiva = 'todos';

function renderProductos() {
  const filtrados = categoriaActiva === 'todos' ? MENU : MENU.filter(p => p.cat === categoriaActiva);
  const cats = [...new Set(filtrados.map(p => p.cat))];
  const NOMBRES_CAT = { principal: 'Platos fuertes', entrada: 'Entradas', bebida: 'Bebidas', postre: 'Postres' };

  let html = '';
  cats.forEach(cat => {
    const prods = filtrados.filter(p => p.cat === cat);
    html += `<div class="seccion-titulo">${NOMBRES_CAT[cat]}</div><div class="productos">`;
    prods.forEach(p => {
      const cant = carrito[p.id]?.cant || 0;
      html += `
        <div class="producto-card">
          <div class="prod-emoji">${p.emoji}</div>
          <div class="prod-info">
            <div class="prod-nombre">${p.nombre}</div>
            <div class="prod-desc">${p.desc}</div>
            <div class="prod-precio">$${p.precio.toLocaleString('es-CO')}</div>
          </div>
          <div class="prod-acciones">
            <button class="btn-cantidad" onclick="cambiarCant(${p.id}, -1)">−</button>
            <span class="cantidad-num">${cant}</span>
            <button class="btn-cantidad" onclick="cambiarCant(${p.id}, 1)">+</button>
          </div>
        </div>`;
    });
    html += '</div>';
  });
  document.getElementById('lista-productos').innerHTML = html;
}

function filtrar(cat, btn) {
  categoriaActiva = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('activa'));
  btn.classList.add('activa');
  renderProductos();
}

function cambiarCant(id, delta) {
  const prod = MENU.find(p => p.id === id);
  if (!carrito[id]) carrito[id] = { ...prod, cant: 0 };
  carrito[id].cant = Math.max(0, carrito[id].cant + delta);
  if (carrito[id].cant === 0) delete carrito[id];
  actualizarBarraCarrito();
  renderProductos();
}

function actualizarBarraCarrito() {
  const items = Object.values(carrito);
  const total = items.reduce((s, i) => s + i.precio * i.cant, 0);
  const count = items.reduce((s, i) => s + i.cant, 0);
  const btn = document.getElementById('btn-carrito');
  document.getElementById('carrito-count').textContent = `${count} ${count === 1 ? 'item' : 'items'} · $${total.toLocaleString('es-CO')}`;
  btn.classList.toggle('oculto', count === 0);
}

function abrirCarrito() {
  const items = Object.values(carrito);
  const total = items.reduce((s, i) => s + i.precio * i.cant, 0);
  let html = '';
  items.forEach(i => {
    html += `<div class="item-carrito">
      <span class="item-carrito-nombre">${i.cant}× ${i.nombre}</span>
      <span class="item-carrito-precio">$${(i.precio * i.cant).toLocaleString('es-CO')}</span>
      <button class="item-carrito-quitar" onclick="quitarItem(${i.id})">×</button>
    </div>`;
  });
  document.getElementById('lista-carrito').innerHTML = html;
  document.getElementById('total-modal').textContent = '$' + total.toLocaleString('es-CO');
  document.getElementById('modal-carrito').classList.add('visible');
}

function cerrarCarrito() {
  document.getElementById('modal-carrito').classList.remove('visible');
}

function quitarItem(id) {
  delete carrito[id];
  actualizarBarraCarrito();
  abrirCarrito();
  renderProductos();
}

/* ══ ENVIAR PEDIDO A GOOGLE SHEETS ══ */
async function enviarPedido() {
  const items = Object.values(carrito);
  if (items.length === 0) return;

  const mesa = document.getElementById('input-mesa').value || '?';
  const notas = document.getElementById('input-notas').value;
  const total = items.reduce((s, i) => s + i.precio * i.cant, 0);
  const num = Math.floor(Math.random() * 9000) + 1000;

  const resumen = items.map(i => `${i.cant}x ${i.nombre}`).join(', ');

  const pedido = {
    accion: 'nuevo_pedido',
    numero: num,
    mesa: mesa,
    items: resumen,
    total: total,
    notas: notas,
    hora: new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' }),
  };

  // Enviar a Google Apps Script
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(pedido),
    });
  } catch (e) {
    // no-cors siempre lanza error de lectura, ignorar
  }

  // Mostrar éxito
  cerrarCarrito();
  document.getElementById('pantalla-menu').style.display = 'none';
  document.getElementById('pantalla-menu-extra').style.display = 'none';
  document.getElementById('num-pedido').textContent = '#' + num;
  document.getElementById('pantalla-exito').classList.add('visible');
}

/* Leer mesa desde URL (?mesa=03) */
const urlParams = new URLSearchParams(window.location.search);
const mesaUrl = urlParams.get('mesa');
if (mesaUrl) {
  document.getElementById('chip-mesa').textContent = 'Mesa ' + mesaUrl;
  document.getElementById('input-mesa').value = mesaUrl;
}

renderProductos();
</script>
</body>
</html>
